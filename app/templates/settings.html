<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sheet Settings</title>
</head>
<body>
  <h1>Google Sheet Configuration</h1>
  <p>Project: {{ gcp_project_id }} | Secret: {{ gcp_secret_name }}</p>
  <form action="/settings" method="post" enctype="multipart/form-data">
    <label>Sheet ID</label><br />
    <input name="sheet_id" value="{{ settings.sheet_id }}" required /><br /><br />

    <label>Worksheet Name</label><br />
    <input name="worksheet_name" value="{{ settings.worksheet_name }}" required /><br /><br />

    <label>Google API Key (optional)</label><br />
    <input name="google_api_key" value="{{ settings.google_api_key }}" /><br /><br />

    <label>Service Account JSON file</label><br />
    <input type="file" name="credentials_file" accept=".json" required /><br /><br />

    <button type="submit">Save</button>
  </form>
  <form action="/settings/validate" method="post" style="margin-top: 12px;">
    <button type="submit">Validate current config</button>
  </form>

  <p><a href="/history">Go to history page</a></p>
</body>
</html>
